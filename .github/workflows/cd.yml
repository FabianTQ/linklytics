name: CD

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Build & push images to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (api)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-api
          tags: |
            type=sha,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build & push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Image metadata (web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-web
          tags: |
            type=sha,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          # NEXT_PUBLIC_API_URL is empty => same-origin client calls via the ingress.
          build-args: |
            NEXT_PUBLIC_API_URL=
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    name: Deploy to production (documented placeholder)
    runs-on: ubuntu-latest
    needs: [publish]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5
      - name: Render prod manifests (validation only — no cluster)
        run: |
          cp deploy/k8s/overlays/prod/secret.example.env deploy/k8s/overlays/prod/secret.env
          kubectl kustomize deploy/k8s/overlays/prod > /tmp/prod-rendered.yaml
          echo "Rendered $(grep -c '^kind:' /tmp/prod-rendered.yaml) resources."
      - name: Deploy step (placeholder — no paid cloud cluster)
        run: |
          echo "This project runs entirely on local kind (\$0)."
          echo "A real deploy would, with a kubeconfig + secrets configured:"
          echo "  1. point overlays/prod images at this run's tags"
          echo "  2. kubectl apply -k deploy/k8s/overlays/prod"
          echo "Published: ${REGISTRY}/${{ github.repository }}-api:${{ github.ref_name }}"
          echo "Published: ${REGISTRY}/${{ github.repository }}-web:${{ github.ref_name }}"
