apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: linklytics

resources:
  - ../../base

# Images are built locally and loaded into kind (no registry).
images:
  - name: linklytics-api
    newTag: local
  - name: linklytics-web
    newTag: local

# Single replica + no TLS for a laptop-sized cluster.
patches:
  - target:
      kind: Deployment
      name: api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: web
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: HorizontalPodAutoscaler
      name: api
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

# Secret is generated from a local, gitignored env file (copy secret.example.env).
secretGenerator:
  - name: linklytics-secret
    envs:
      - secret.env

generatorOptions:
  disableNameSuffixHash: true
