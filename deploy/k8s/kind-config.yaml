kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: linklytics
nodes:
  - role: control-plane
    # Label the node so the ingress-nginx controller schedules here, and map the
    # ingress ports to the host so http://localhost reaches the cluster.
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
