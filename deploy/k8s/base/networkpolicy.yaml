# Zero-trust posture: default-deny ingress, then explicitly allow the flows we
# need. NOTE: kind's default CNI (kindnet) does NOT enforce NetworkPolicies — on
# kind these are declarative only. A CNI like Calico enforces them in prod.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  labels:
    app.kubernetes.io/part-of: linklytics
spec:
  podSelector: {}
  policyTypes: ['Ingress']
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-from-api
  labels:
    app.kubernetes.io/part-of: linklytics
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres
  policyTypes: ['Ingress']
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-from-api
  labels:
    app.kubernetes.io/part-of: linklytics
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis
  policyTypes: ['Ingress']
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api
      ports:
        - protocol: TCP
          port: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-from-ingress
  labels:
    app.kubernetes.io/part-of: linklytics
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: api
  policyTypes: ['Ingress']
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: web
      ports:
        - protocol: TCP
          port: 3001
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-from-ingress
  labels:
    app.kubernetes.io/part-of: linklytics
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: web
  policyTypes: ['Ingress']
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
