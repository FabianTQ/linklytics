apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: linklytics
  labels:
    app.kubernetes.io/part-of: linklytics
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 1m
spec:
  ingressClassName: nginx
  rules:
    # Single host for the local demo. Longest-prefix wins, so /api and /r are
    # matched before the catch-all / which serves the web app.
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 3001
          - path: /r
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
